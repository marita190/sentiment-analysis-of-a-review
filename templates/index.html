<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ тональности отзывов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #4a327e 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        h2 {
            color: #555;
            font-size: 1.3rem;
            margin-bottom: 15px;
            margin-top: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
            margin-top: 0;
        }

        .tab-btn:hover {
            background: none;
            transform: none;
            box-shadow: none;
            color: #ac66ea;
        }

        .tab-btn.active {
            color: #8649c3;
            border-bottom: 2px solid #8766ea;
            margin-bottom: -2px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        .input-section {
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #7e66ea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .file-upload-area {
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .file-upload-area:hover {
            border-color: #7366ea;
            background: #f8f9fa;
        }

        .file-upload-area.dragover {
            border-color: #667eea;
            background: #e8edff;
        }

        .file-info {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        .method-selection {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .method-label {
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .method-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .method-option {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .method-option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .method-option input[type="radio"] {
            margin-right: 10px;
        }

        .method-option span {
            font-weight: bold;
        }

        .method-option small {
            display: block;
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            margin-left: 24px;
        }

        .method-option:has(input:checked) {
            border-color: #667eea;
            background: #e8edff;
        }

        .result-section {
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 12px;
            background: #f8f9fa;
        }

        .result-section.hidden {
            display: none;
        }

        .result-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .review-text {
            padding: 15px;
            background: white;
            border-radius: 10px;
            border-left: 4px solid #5f4cb1;
        }

        .sentiment-display {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .emoji {
            font-size: 48px;
        }

        .sentiment-text {
            font-size: 18px;
            font-weight: bold;
        }

        .method-info {
            padding: 10px 15px;
            background: #e8edff;
            border-radius: 8px;
            font-size: 14px;
        }

        .keywords-section {
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .keywords-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .keyword-tag {
            background: #e2e8f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: #4a5568;
        }

        .batch-results {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .batch-stats {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .stat-card {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
        }

        .stat-card.positive {
            background: #e6fffa;
            color: #38a169;
        }

        .stat-card.negative {
            background: #fff5f5;
            color: #e53e3e;
        }

        .stat-card.neutral {
            background: #ebf8ff;
            color: #3182ce;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
        }

        .batch-item {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 3px solid;
            font-size: 13px;
        }

        .reviews-feed {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .review-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid;
            transition: transform 0.2s;
        }

        .review-card:hover {
            transform: translateX(5px);
        }

        .review-card.positive {
            border-left-color: #48bb78;
        }

        .review-card.negative {
            border-left-color: #f56565;
        }

        .review-card.neutral {
            border-left-color: #667eea;
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .review-emoji {
            font-size: 20px;
        }

        .review-sentiment {
            font-weight: bold;
        }

        .review-method {
            font-size: 11px;
            color: #666;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .review-text-preview {
            color: #4a5568;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .review-score {
            font-size: 12px;
            color: #718096;
        }

        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
        }

        .error {
            color: #f56565;
            padding: 10px;
            border-radius: 8px;
            background: #fff5f5;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-section, .review-card {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Анализ тональности отзывов</h1>
        <div class="subtitle">4 модели машинного обучения | Поддержка файлов CSV, TXT, JSON</div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="single">📝 Один отзыв</button>
            <button class="tab-btn" data-tab="batch">📁 Загрузить файл</button>
        </div>

        <!-- Вкладка: Один отзыв -->
        <div id="single-tab" class="tab-content active">
            <div class="input-section">
                <textarea 
                    id="review-text" 
                    placeholder="Введите ваш отзыв здесь... Например: &quot;Отличный товар, очень доволен покупкой!&quot;"
                    rows="4"
                ></textarea>
                
                <div class="method-selection">
                    <label class="method-label">🎯 Выберите модель анализа:</label>
                    <div class="method-options">
                        <label class="method-option">
                            <input type="radio" name="method" value="dictionary" checked>
                            <span>📖 Словарный метод</span>
                            <small>Быстрый анализ по словарям</small>
                        </label>
                        <label class="method-option">
                            <input type="radio" name="method" value="knn">
                            <span>🔄 KNN</span>
                            <small>k-ближайших соседей</small>
                        </label>
                        <label class="method-option">
                            <input type="radio" name="method" value="logreg">
                            <span>📊 Логистическая      регрессия</span>
                            <small>Обученная модель</small>
                        </label>
                    </div>
                </div>
                
                <button id="analyze-btn">🚀 Анализировать</button>
            </div>
        </div>

        <!-- Вкладка: Загрузка файла -->
        <div id="batch-tab" class="tab-content">
            <div class="method-selection">
                <label class="method-label">🎯 Выберите модель для всех отзывов:</label>
                <div class="method-options">
                    <label class="method-option">
                        <input type="radio" name="batch-method" value="dictionary" checked>
                        <span>📖 Словарный метод</span>
                        <small>Быстрый анализ по словарям</small>
                    </label>
                    <label class="method-option">
                        <input type="radio" name="batch-method" value="knn">
                        <span>🔄 KNN</span>
                        <small>k-ближайших соседей</small>
                    </label>
                    <label class="method-option">
                        <input type="radio" name="batch-method" value="logreg">
                        <span>📊 Логистическая регрессия</span>
                        <small>Обученная модель</small>
                    </label>
                </div>
            </div>

            <div class="file-upload-area" id="file-upload-area">
                <div>📁 Перетащите файл сюда или нажмите для выбора</div>
                <div class="file-info">Поддерживаются: CSV, TXT, JSON (максимум 100 отзывов)</div>
            </div>
            <input type="file" id="file-input" accept=".csv,.txt,.json" style="display: none;">

            <button id="upload-btn" style="width: 100%;">📊 Анализировать файл</button>

            <div id="progress-container" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div id="progress-text" style="text-align: center; margin-top: 10px; font-size: 14px;"></div>
            </div>

            <div id="batch-result-container" style="display: none;">
                <div class="batch-stats" id="batch-stats"></div>
                <div class="batch-results" id="batch-results"></div>
            </div>
        </div>

        <div id="result-section" class="result-section hidden">
            <h2>📊 Результат анализа</h2>
            <div id="result-content" class="result-content"></div>
        </div>

        <div class="feed-section">
            <h2>📋 Последние отзывы</h2>
            <div id="reviews-feed" class="reviews-feed">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // === ПЕРЕМЕННЫЕ ===
            let selectedFile = null;
            
            // === ВКЛАДКИ ===
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabId = tab.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`${tabId}-tab`).classList.add('active');
                });
            });

            // === РАБОТА С ФАЙЛАМИ ===
            const fileUploadArea = document.getElementById('file-upload-area');
            const fileInput = document.getElementById('file-input');

            if (fileUploadArea) {
                fileUploadArea.addEventListener('click', () => fileInput.click());
                
                fileUploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    fileUploadArea.classList.add('dragover');
                });
                
                fileUploadArea.addEventListener('dragleave', () => {
                    fileUploadArea.classList.remove('dragover');
                });
                
                fileUploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    fileUploadArea.classList.remove('dragover');
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        selectedFile = files[0];
                        fileUploadArea.innerHTML = `<div>📄 Выбран: ${selectedFile.name}</div>
                            <div class="file-info">Нажмите "Анализировать файл" для начала</div>`;
                    }
                });
            }

            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        selectedFile = e.target.files[0];
                        fileUploadArea.innerHTML = `<div>📄 Выбран: ${selectedFile.name}</div>
                            <div class="file-info">Нажмите "Анализировать файл" для начала</div>`;
                    }
                });
            }

            // === ЗАГРУЗКА ФАЙЛА ===
            document.getElementById('upload-btn').addEventListener('click', async () => {
                if (!selectedFile) {
                    alert('Пожалуйста, выберите файл');
                    return;
                }

                const method = document.querySelector('input[name="batch-method"]:checked').value;
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('method', method);

                const uploadBtn = document.getElementById('upload-btn');
                const progressContainer = document.getElementById('progress-container');
                const progressFill = document.getElementById('progress-fill');
                const progressText = document.getElementById('progress-text');
                const batchResultContainer = document.getElementById('batch-result-container');

                uploadBtn.disabled = true;
                uploadBtn.textContent = '⏳ Обработка...';
                progressContainer.style.display = 'block';
                progressFill.style.width = '30%';
                progressText.textContent = 'Анализ файла...';

                try {
                    const response = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });

                    progressFill.style.width = '100%';
                    progressText.textContent = 'Завершено!';

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || 'Ошибка при загрузке');
                    }

                    const data = await response.json();
                    
                    if (data.error) {
                        alert(data.error);
                    } else {
                        displayBatchResults(data);
                        batchResultContainer.style.display = 'block';
                        await loadReviews();
                        selectedFile = null;
                        fileUploadArea.innerHTML = `<div>📁 Перетащите файл сюда или нажмите для выбора</div>
                            <div class="file-info">Поддерживаются: CSV, TXT, JSON (максимум 100 отзывов)</div>`;
                    }
                } catch (error) {
                    console.error('Ошибка:', error);
                    alert(error.message || 'Произошла ошибка');
                } finally {
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = '📊 Анализировать файл';
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                    }, 1500);
                }
            });

            function displayBatchResults(data) {
                const statsContainer = document.getElementById('batch-stats');
                statsContainer.innerHTML = `
                    <div class="stat-card positive">
                        <div class="stat-number">${data.stats.positive}</div>
                        <div>😊 Позитивных</div>
                    </div>
                    <div class="stat-card negative">
                        <div class="stat-number">${data.stats.negative}</div>
                        <div>😞 Негативных</div>
                    </div>
                    <div class="stat-card neutral">
                        <div class="stat-number">${data.stats.neutral}</div>
                        <div>😐 Нейтральных</div>
                    </div>
                `;

                const resultsContainer = document.getElementById('batch-results');
                resultsContainer.innerHTML = `<h4>📝 Первые ${data.results.length} отзывов:</h4>` + 
                    data.results.map(r => `
                        <div class="batch-item" style="border-left-color: ${getColorForSentiment(r.sentiment)}">
                            <strong>${r.emoji} ${getSentimentText(r.sentiment)}</strong> (оценка: ${r.score})
                            <div style="margin-top: 5px; font-size: 12px; color: #666;">${escapeHtml(r.text)}</div>
                            ${r.keywords.length ? `<div style="margin-top: 5px; font-size: 11px;">🔑 ${r.keywords.join(', ')}</div>` : ''}
                        </div>
                    `).join('');
            }

            // === АНАЛИЗ ОДНОГО ОТЗЫВА ===
            const analyzeBtn = document.getElementById('analyze-btn');
            const reviewText = document.getElementById('review-text');
            const resultSection = document.getElementById('result-section');
            const resultContent = document.getElementById('result-content');
            const reviewsFeed = document.getElementById('reviews-feed');

            loadReviews();

            analyzeBtn.addEventListener('click', async function() {
                const text = reviewText.value.trim();
                
                if (!text) {
                    alert('Пожалуйста, введите текст отзыва');
                    return;
                }

                const selectedMethod = document.querySelector('input[name="method"]:checked').value;

                analyzeBtn.disabled = true;
                analyzeBtn.textContent = '⏳ Анализируем...';

                try {
                    const response = await fetch('/analyze', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ 
                            text: text,
                            method: selectedMethod
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || 'Ошибка при анализе');
                    }

                    const result = await response.json();
                    displayResult(result);
                    await loadReviews();
                    reviewText.value = '';
                    
                } catch (error) {
                    console.error('Ошибка:', error);
                    alert(error.message || 'Произошла ошибка при анализе отзыва');
                } finally {
                    analyzeBtn.disabled = false;
                    analyzeBtn.textContent = '🚀 Анализировать';
                }
            });

            function displayResult(result) {
                resultSection.classList.remove('hidden');
                
                const methodNames = {
                    'dictionary': 'Словарный метод',
                    'knn': 'KNN (k-ближайших соседей)',
                    'rubert': 'RuBERT (трансформер)',
                    'logreg': 'Логистическая регрессия'
                };
                
                const sentimentText = {
                    'positive': 'Позитивная 😊',
                    'negative': 'Негативная 😞',
                    'neutral': 'Нейтральная 😐'
                };
                
                resultContent.innerHTML = `
                    <div class="review-text">
                        <strong>📝 Текст:</strong> ${escapeHtml(result.text)}
                    </div>
                    <div class="sentiment-display" style="border-left: 4px solid ${result.color}">
                        <span class="emoji">${result.emoji}</span>
                        <span class="sentiment-text">
                            ${sentimentText[result.sentiment]} (${result.score.toFixed(2)})
                        </span>
                    </div>
                    <div class="method-info">
                        <strong>🧠 Модель:</strong> ${methodNames[result.method_used] || result.method_used}
                    </div>
                    ${result.keywords && result.keywords.length > 0 ? `
                        <div class="keywords-section">
                            <strong>🔑 Ключевые слова:</strong>
                            <div class="keywords-tags">
                                ${result.keywords.slice(0, 5).map(keyword => 
                                    `<span class="keyword-tag">${escapeHtml(keyword)}</span>`
                                ).join('')}
                            </div>
                        </div>
                    ` : '<div class="keywords-section"><strong>🔑 Ключевые слова:</strong> не найдены</div>'}
                `;
            }

            async function loadReviews() {
                try {
                    const response = await fetch('/reviews');
                    if (!response.ok) {
                        throw new Error('Ошибка при загрузке отзывов');
                    }
                    
                    const reviews = await response.json();
                    displayReviews(reviews);
                } catch (error) {
                    console.error('Ошибка загрузки отзывов:', error);
                    reviewsFeed.innerHTML = '<div class="error">❌ Не удалось загрузить отзывы</div>';
                }
            }

            function displayReviews(reviews) {
                if (!reviews || reviews.length === 0) {
                    reviewsFeed.innerHTML = '<div class="loading">📭 Пока нет отзывов</div>';
                    return;
                }

                const methodNames = {
                    'dictionary': 'словарный',
                    'knn': 'KNN',
                    'rubert': 'RuBERT',
                    'logreg': 'лог.регрессия'
                };

                const sentimentText = {
                    'positive': 'Позитивный',
                    'negative': 'Негативный',
                    'neutral': 'Нейтральный'
                };

                reviewsFeed.innerHTML = reviews.map(review => `
                    <div class="review-card ${review.sentiment}">
                        <div class="review-header">
                            <span class="review-emoji">${review.emoji || '😐'}</span>
                            <span class="review-sentiment">${sentimentText[review.sentiment]}</span>
                            <span class="review-method">${methodNames[review.method] || review.method}</span>
                        </div>
                        <div class="review-text-preview">
                            ${escapeHtml(review.text.substring(0, 100))}${review.text.length > 100 ? '...' : ''}
                        </div>
                        <div class="review-score">⭐ Оценка: ${review.score}</div>
                    </div>
                `).join('');
            }

            function getColorForSentiment(sentiment) {
                const colors = {
                    'positive': '#48bb78',
                    'negative': '#f56565',
                    'neutral': '#667eea'
                };
                return colors[sentiment] || '#999';
            }

            function getSentimentText(sentiment) {
                const texts = {
                    'positive': 'Позитивный',
                    'negative': 'Негативный',
                    'neutral': 'Нейтральный'
                };
                return texts[sentiment] || sentiment;
            }

            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            reviewText.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    analyzeBtn.click();
                }
            });
        });
    </script>
</body>
</html>
